<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A7FE8"/>
      <stop offset="100%" stop-color="#1A5CC8"/>
    </linearGradient>
    <linearGradient id="clockGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF9F2F"/>
      <stop offset="100%" stop-color="#E07010"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- 背景: 丸角正方形 -->
  <rect x="8" y="8" width="240" height="240" rx="46" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- 背景ハイライト (上部) -->
  <rect x="8" y="8" width="240" height="90" rx="46" fill="white" opacity="0.07"/>
  <rect x="8" y="78" width="240" height="20" fill="white" opacity="0.03"/>

  <!-- ファイルアイコン (白) -->
  <g transform="translate(32, 36)">
    <!-- ファイル本体 -->
    <path d="M10 30 L10 148 L110 148 L110 10 L40 10 Z" fill="white" opacity="0.92"/>
    <!-- 折り返し三角 -->
    <path d="M10 30 L40 10 L40 30 Z" fill="#A8C8FF" opacity="0.75"/>
    <!-- 内側のテキストライン -->
    <rect x="24" y="52" width="72" height="8" rx="4" fill="#2060B8" opacity="0.22"/>
    <rect x="24" y="70" width="64" height="8" rx="4" fill="#2060B8" opacity="0.22"/>
    <rect x="24" y="88" width="68" height="8" rx="4" fill="#2060B8" opacity="0.22"/>
    <rect x="24" y="106" width="50" height="8" rx="4" fill="#2060B8" opacity="0.22"/>
  </g>

  <!-- 時計アイコン (右下) -->
  <!-- 白縁取り -->
  <circle cx="172" cy="170" r="58" fill="white" opacity="0.95"/>
  <!-- 本体 -->
  <circle cx="172" cy="170" r="52" fill="url(#clockGrad)"/>
  <!-- 文字盤 明るいリング -->
  <circle cx="172" cy="170" r="43" fill="none" stroke="white" stroke-width="1.5" opacity="0.25"/>

  <!-- 目盛り (12, 3, 6, 9時) -->
  <circle cx="172" cy="122" r="4" fill="white" opacity="0.9"/>
  <circle cx="220" cy="170" r="4" fill="white" opacity="0.9"/>
  <circle cx="172" cy="218" r="4" fill="white" opacity="0.9"/>
  <circle cx="124" cy="170" r="4" fill="white" opacity="0.9"/>

  <!-- 長針 (12時方向) -->
  <line x1="172" y1="170" x2="172" y2="132" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <!-- 短針 (3時方向) -->
  <line x1="172" y1="170" x2="205" y2="170" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- 中心点 -->
  <circle cx="172" cy="170" r="6" fill="white"/>
</svg>
